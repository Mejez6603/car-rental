<!DOCTYPE html>
<html>
<head>
  <title>Live Fleet Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; }
    #map { height: 100vh; width: 100vw; z-index: 1; }
    .dashboard-panel {
      position: absolute; top: 20px; left: 20px; z-index: 1000;
      background: white; padding: 20px; border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 260px;
    }
    .dashboard-panel h2 { margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 8px; }
    .data-row { margin: 8px 0; font-size: 0.9rem; color: #444; display: flex; justify-content: space-between; }
    .data-value { font-weight: bold; color: #007bff; }
    .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>

  <div class="dashboard-panel">
    <h2 id="ui-header"><span id="ui-dot" class="status-dot" style="background-color: #888;"></span>Car-001</h2>
    <div class="data-row">Satellites: <span id="ui-sats" class="data-value">--</span></div>
    <div class="data-row">Latitude: <span id="ui-lat" class="data-value">--</span></div>
    <div class="data-row">Longitude: <span id="ui-lng" class="data-value">--</span></div>
    <div class="data-row" style="font-size: 0.75rem; color: #999; margin-top: 15px;">
      Last Server Update: <span id="ui-time">--</span>
    </div>
  </div>

  <div id="map"></div>

<script>
    const blynkToken = "6fub_AeSZfywBab9j-d7KRXWKFPMwIxz";
    const blynkServer = "sgp1.blynk.cloud"; 

    const map = L.map('map').setView([14.2600, 121.3958], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    const carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
        iconSize: [40, 40], iconAnchor: [20, 20]
    });

    let carMarker = L.marker([14.2600, 121.3958], {icon: carIcon}).addTo(map);

    // 1. DATA FETCH (Statistics - working, don't touch)
    async function updateStats() {
      try {
        const r = await fetch(`https://${blynkServer}/external/api/get?token=${blynkToken}&v1&v2&v3&_=${Date.now()}`);
        const data = await r.json();
        if (data) {
          document.getElementById("ui-lat").innerText = data.v1 || "--";
          document.getElementById("ui-lng").innerText = data.v2 || "--";
          document.getElementById("ui-sats").innerText = data.v3 || "0";
          const lat = parseFloat(data.v1);
          const lng = parseFloat(data.v2);
          if (!isNaN(lat) && !isNaN(lng)) {
            carMarker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
          }
        }
      } catch (e) { console.log("Stats fetch error"); }
    }

    // 2. STATUS & TIME LOGIC (The Watchdog)
    async function updateStatus() {
      try {
        const r = await fetch(`https://${blynkServer}/external/api/get/metadata?token=${blynkToken}&v1`);
        const meta = await r.json();
        
        // Handle array or object response
        const metaData = Array.isArray(meta) ? meta[0] : meta;
        
        const dot = document.getElementById("ui-dot");
        const header = document.getElementById("ui-header");
        const timeDisplay = document.getElementById("ui-time");

        if (metaData && metaData.updatedAt) {
          const lastUpdate = new Date(metaData.updatedAt);
          const now = new Date();
          const diffSeconds = Math.floor((now - lastUpdate) / 1000);

          // --- THE FORMULA ---
          if (diffSeconds < 90) {
            // ONLINE: Update Dot, Text, and Time
            dot.style.backgroundColor = "#28a745"; // Green
            header.innerHTML = `<span id="ui-dot" class="status-dot" style="background-color:#28a745"></span>Car-001 (Active)`;
            
            // Only update time display while Online
            timeDisplay.innerText = lastUpdate.toLocaleTimeString();
          } else {
            // OFFLINE: Change Dot and Text, but DO NOT update timeDisplay.innerText
            dot.style.backgroundColor = "#dc3545"; // Red
            header.innerHTML = `<span id="ui-dot" class="status-dot" style="background-color:#dc3545"></span>Car-001 (Offline)`;
            
            // Time text remains frozen at the last value it had during 'Active' state
          }
        }
      } catch (e) { console.log("Metadata error:", e); }
    }

    function tick() {
      updateStats();
      updateStatus();
    }

    tick();
    setInterval(tick, 5000); 
</script>
</body>
</html>
