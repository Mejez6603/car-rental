<!DOCTYPE html>
<html>
<head>
  <title>Live Fleet Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; }
    #map { height: 100vh; width: 100vw; z-index: 1; }
    
    /* Custom UI Panel hovering over the map */
    .dashboard-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 250px;
    }
    .dashboard-panel h2 { margin-top: 0; font-size: 1.2rem; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    .data-row { margin: 10px 0; font-size: 0.95rem; color: #555; }
    .data-value { font-weight: bold; color: #007bff; float: right; }
    .status-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
  </style>
</head>
<body>

  <div class="dashboard-panel">
    <h2><span class="status-dot"></span>Car-001 (Active)</h2>
    <div class="data-row">Satellites: <span id="ui-sats" class="data-value">Loading...</span></div>
    <div class="data-row">Latitude: <span id="ui-lat" class="data-value">--</span></div>
    <div class="data-row">Longitude: <span id="ui-lng" class="data-value">--</span></div>
    <div class="data-row" style="font-size: 0.8rem; margin-top: 20px; color: #888;">
      Last Updated: <span id="ui-time">--</span>
    </div>
  </div>

  <div id="map"></div>

  <script>
    // --- Configuration ---
    const blynkToken = "6fub_AeSZfywBab9j-d7KRXWKFPMwIxz";
    const blynkServer = "sgp1.blynk.cloud"; 
    
    // Initialize the map (Centered on your first coordinate in Laguna)
    const map = L.map('map').setView([14.260040, 121.396011], 16);

    // Load the free OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Create the car marker
    let carMarker = L.marker([14.260040, 121.396011]).addTo(map);
    carMarker.bindPopup("<b>Car-001</b><br>Currently Active").openPopup();

    // Function to silently fetch data from Blynk
    async function getBlynkData(pin) {
      try {
        const response = await fetch(`https://${blynkServer}/external/api/get?token=${blynkToken}&${pin}`);
        return await response.text();
      } catch (error) {
        console.error("Network error fetching pin: ", pin);
        return null;
      }
    }

    // Main update loop
    async function updateDashboard() {
      // Fetch V1, V2, and V3 simultaneously
      const lat = await getBlynkData("v1");
      const lng = await getBlynkData("v2");
      const sats = await getBlynkData("v3");

      if (lat && lng && sats) {
        const floatLat = parseFloat(lat);
        const floatLng = parseFloat(lng);

        // Update HTML text
        document.getElementById("ui-lat").innerText = floatLat.toFixed(5);
        document.getElementById("ui-lng").innerText = floatLng.toFixed(5);
        document.getElementById("ui-sats").innerText = sats;
        document.getElementById("ui-time").innerText = new Date().toLocaleTimeString();

        // Move the marker to the new GPS location
        const newLatLng = new L.LatLng(floatLat, floatLng);
        carMarker.setLatLng(newLatLng);
        
        // Optional: Make the map automatically follow the car
        map.panTo(newLatLng); 
      }
    }

    // Run the update immediately, then refresh every 10 seconds
    updateDashboard();
    setInterval(updateDashboard, 10000);

  </script>
</body>
</html>
